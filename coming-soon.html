<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เร็ว ๆ นี้ — DHAMMADHA STUDIO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--mint:#5ECEC8;--navy:#2B1B3D;--bg:#f5f5f2;--border:#e8e8e0}
  body{font-family:"Noto Sans Thai",-apple-system,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
  nav{display:flex;align-items:center;padding:14px 32px;background:#fff;border-bottom:0.5px solid var(--border)}
  .logo{display:flex;align-items:center;gap:9px;text-decoration:none}
  .logo-img{width:36px;height:36px;border-radius:6px;object-fit:cover}
  .logo-text{display:flex;flex-direction:column;justify-content:center;gap:1px;height:36px}
  .logo-name{font-size:16px;font-weight:600;color:var(--navy);letter-spacing:.05em;line-height:1}
  .logo-sub{font-size:12px;color:#aaa;letter-spacing:.06em;line-height:1}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;text-align:center}
  .coming-icon{width:72px;height:72px;background:var(--mint);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 32px}
  .coming-icon svg{width:38px;height:38px}
  h1{font-size:56px;font-weight:700;color:var(--navy);letter-spacing:-1px;line-height:1;margin-bottom:16px}
  .subtitle{font-size:17px;color:#666;line-height:1.65;margin-bottom:36px}
  .btn-home{display:inline-block;padding:12px 28px;background:var(--navy);color:#fff;text-decoration:none;border-radius:8px;font-size:15px;font-weight:500;font-family:"Noto Sans Thai",sans-serif;transition:opacity .15s}
  .btn-home:hover{opacity:.85}
  footer{padding:20px 32px;background:#fff;border-top:0.5px solid var(--border);text-align:center;font-size:11px;color:#bbb}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">
    <img src="/logo_DHAMMADHA_2025_simple.png" class="logo-img" alt="Dhammadha Studio">
    <div class="logo-text">
      <div class="logo-name">DHAMMADHA</div>
      <div class="logo-sub">STUDIO</div>
    </div>
  </a>
</nav>
<main>
  <div class="coming-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#2B1B3D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
  </div>
  <h1>เร็ว ๆ นี้</h1>
  <p class="subtitle">ระบบ Subscription กำลังจะเปิดให้บริการ</p>
  <a href="/" class="btn-home">← กลับหน้าหลัก</a>
</main>
<footer>© 2012–2026 DHAMMADHA STUDIO</footer>
</body>
</html>
